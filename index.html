<body>
    <div class="container">
        <div class="signinFormArea flex">

            <form class="signinForm">
                <h2>Signin Form</h2> 
                <input type="text" class="signinEmail" placeholder="Enter Email">
                <input type="text" class="signinPassword" placeholder="Enter Password">
                <button type="submit">Submit</button>
            </form>
        </div>
        <div class="signupFormArea flex">

            <form class="signupForm">
                <h2>Sign up Form</h2>
                <input type="text" class="signupFullName" placeholder="Enter Full Name">
                <input type="text" class="signupEmail" placeholder="Enter Email">
                <input type="text" class="signupPassword" placeholder="Enter Password">
                <button type="submit">Submit</button>
                <button class="googleBtn" type="button">Sign in With Google</button>
            </form>
        </div>
    </div>
